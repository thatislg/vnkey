name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ===== Fcitx5 DEB (Debian/Ubuntu/Linux Mint) =====
  fcitx5-deb:
    runs-on ubuntu-latest
    container debian:12
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            curl \
            build-essential \
            cmake \
            fcitx5-dev \
            libfcitx5-utils-dev \
            libglib2.0-dev \
            pkg-config \
            ca-certificates
        shell: bash

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            vnkey-engine/target
          key: deb-fcitx5-cargo-${{ hashFiles('vnkey-engine/Cargo.lock') }}

      - name: Build vnkey-engine
        run: cd vnkey-engine && cargo build --release

      - name: Build vnkey-fcitx5 & package DEB
        run: |
          cd vnkey-fcitx5
          bash scripts/build.sh package

      - name: Upload Fcitx5 DEB
        uses: actions/upload-artifact@v4
        with:
          name: vnkey-fcitx5-deb
          path: vnkey-fcitx5/build/*.deb

  # ===== Fcitx5 RPM (Fedora/RHEL) =====
  fcitx5-rpm:
    runs-on ubuntu-latest
    container fedora:41
    steps:
      - name: Install dependencies
        run: |
          dnf install -y \
            curl \
            gcc \
            gcc-c++ \
            cmake \
            fcitx5-devel \
            glib2-devel \
            pkg-config
        shell: bash

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            vnkey-engine/target
          key: rpm-fcitx5-cargo-${{ hashFiles('vnkey-engine/Cargo.lock') }}

      - name: Build vnkey-engine
        run: cd vnkey-engine && cargo build --release

      - name: Build vnkey-fcitx5 & package RPM
        run: |
          cd vnkey-fcitx5
          bash scripts/build.sh package

      - name: Upload Fcitx5 RPM
        uses: actions/upload-artifact@v4
        with:
          name: vnkey-fcitx5-rpm
          path: vnkey-fcitx5/build/*.rpm

  # ===== Arch Linux =====
  arch:
    runs-on ubuntu-latest
    container archlinux:latest
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm \
            base-devel \
            cmake \
            fcitx5 \
            glib2 \
            curl
        shell: bash

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build vnkey-engine
        run: cd vnkey-engine && cargo build --release

      - name: Build & package vnkey-fcitx5
        run: |
          cd vnkey-fcitx5
          bash scripts/build.sh package

      - name: Upload Fcitx5 Arch package
        uses: actions/upload-artifact@v4
        with:
          name: vnkey-fcitx5-arch
          path: vnkey-fcitx5-*.pkg.tar.zst

  # ===== Release =====
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [fcitx5-deb, fcitx5-rpm, arch]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          cp artifacts/vnkey-fcitx5-deb/*.deb release/
          cp artifacts/vnkey-fcitx5-rpm/*.rpm release/
          cp artifacts/vnkey-fcitx5-arch/*.pkg.tar.zst release/
        shell: bash

      - name: Generate SHA256 checksums
        run: |
          cd release
          sha256sum *.deb *.rpm *.pkg.tar.zst > SHA256SUMS
        shell: bash

      - name: Extract changelog
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          awk -v ver="$VERSION" '
            /^## \[v/ {
              if (p) exit
              if ($0 ~ ver) p=1
            }
            p { print }
          ' CHANGELOG.md > /tmp/release_body.md
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: /tmp/release_body.md
          prerelease: ${{ contains(github.ref, '-') }}
